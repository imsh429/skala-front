<!DOCTYPE html>
<html lang="ko">
<head>

    <title>나의 휴일 일과</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>🩷<mark>저를 소개합니다~</mark>🩷</h1>

    <h2>내가 좋아하는 음식</h2>
    <ul>
        <li>초밥</li>
        <li>엽기떡볶이</li>
        <li>마라탕</li>
    </ul>
    <br>
    <hr>
    

    <h2>올해 할 일</h2>
    <ol>
        <li>독서</li>
        <li>음악 듣기</li>
        <li>산책</li>
    </ol>
    <br>
    <hr>

    <dl>
        <dt>성격</dt>
        <dd>활발하고 긍정적이다</dd>
        <dt>취미</dt>

    </div>


    <div class="container">
    <h1>🤷🏻‍♀️<mark>문의사항이 있다면 아래 폼을 작성해주세요</mark></h1>
    <br>
    <form>
        <input type="text" name="name" placeholder="이름을 입력해주세요"><br><br>
        <input type="email" name="email" placeholder="이메일을 입력해주세요"><br><br>
        <input type="text" name="message" placeholder="문의사항을 입력해주세요"><br><br>
        <input type="submit" value="제출">
    </form>
    </div>
