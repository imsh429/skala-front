<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 일지</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>🌎<strong> 제가 다녀온 여행지를 소개합니다.</strong></h1>
        <p>2n년동안 <mark>재밌게</mark> 다녀온 여행지들만 엄선했습니다.</p>
        <small>맘에 드는 곳이 있다면 츄라이 해보십시오</small>
        <br><br>

        <p><small>감미로운 음악을 듣고싶다면 누르세요</small></p>
        <audio controls>
            <source src="../media/music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <hr>
        
        <p class="rating-info">
            ⭐ : 매우 비추천
            <br>
            ⭐⭐ : 비추천
            <br>
            ⭐⭐⭐ : 보통
            <br>
            ⭐⭐⭐⭐ : 추천
            <br>
            ⭐⭐⭐⭐⭐ : 매우 추천
        </p>

        <div class="trip-grid-container">
            <p class="trip-card">
                <img src="../media/진도.jpg" width="400" height="200" alt="진도 쏠비치">
                <br>
                <strong>진도 쏠비치</strong>
                <br>
                ⭐⭐⭐
            </p>

            <p class="trip-card">
                <img src="../media/오사카.jpg" width="400" height="200" alt="오사카">
                <br>
                <strong>오사카</strong>
                <br>
                ⭐⭐⭐⭐⭐
            </p>
            
            <p class="trip-card">
                <img src="../media/담양.jpg" width="400" height="200" alt="담양">
                <br>
                <strong>담양</strong>
                <br>
                ⭐⭐⭐⭐
            </p>
        </div>
        
        <hr>
        
        <h2>오사카 유니버셜 스튜디오 간접체험</h2>
        <p>
            <small>흥겨운 유니버셜 스튜디오 페스티벌 현장을 영상으로 확인하세요</small>
            <br><br>
            <video width="400" height="225" controls>
                <source src="../media/퍼레이드.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </p>
    </div>
</body>
</html>
