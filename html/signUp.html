<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>SKALA에 회원가입하세요!</h1>

        <form action="signUpResult.html" method="get">
            <fieldset>
                <legend>사용자 개인 정보</legend>

                <p>
                    <label for="username">사용자 이름:</label>
                    <input type="text" id="username" name="username" minlength= "1" maxlength="20" required placeholder="한 글자 이상 입력하세요">
                </p>

                <p>
                    <label for="userEmail">이메일: </label>
                    <input type="text" id="userEmail" name="userEmail" placeholder="example">
                    @
                    <select name="emailDomain">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                </p>

                <p>
                    <label for="password">비밀번호:</label>
                    <input type="password" id="password" name="password" minlength="6" maxlength="20" required placeholder="6자 이상 20자 이하로 입력하세요">
                </p>
            </fieldset>

            <fieldset>
                <legend>프로필 설정</legend>
                <p>
                    <label for="profilePicture">프로필 사진:</label>
                    <input type="file" id="profilePicture" name="profilePicture" accept="image/*">
                </p>

                <p>
                    성별: 
                    <label><input type="radio" name="gender" value="male" checked> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택안함</label>
                </p>

                <p>
                    학력 : <br>
                    <label><input type="checkbox" name="interest" value="highschool"> 고등학교</label><br>
                    <label><input type="checkbox" name="interest" value="university"> 대학교</label><br>
                    <label><input type="checkbox" name="interest" value="graduate"> 석사</label><br>
                    <label><input type="checkbox" name="interest" value="phd"> 박사</label>
                </p>

                <p>
                    <label for="birthdate">생년월일:</label>
                    <input type="date" id="birthdate" name="birthdate" required>
                </p>

                <p>
                    <label for="bio">자기소개:</label><br>
                    <textarea id="bio" name="bio" rows="4" cols="50" placeholder="자기소개를 입력하세요"></textarea>
                </p>
            </fieldset>

            <input type="submit" class="btn-submit" value="동의하고 회원가입">
            <input type="reset" class="btn-reset" value="다시 작성">

        </form>
    </div>
</body>
</html>
